<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LFJC · Examination Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== SCREENS ===== */
        .screen {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* ===== LOCK SCREEN ===== */
        .screen-bg {
            background: linear-gradient(135deg, #141E30 0%, #243B55 50%, #0F2027 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 20px;
            height: 100vh;
        }

        .page-header {
            width: 100%;
            text-align: center;
            padding: 55px 0;
            z-index: 10;
            flex-shrink: 0;
        }

        .header-text {
            font-family: 'Inter', 'Arial Black', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #5D4037;
            text-shadow: 
                2px 2px 0 rgba(255, 255, 255, 0.7),
                4px 4px 0 rgba(0, 0, 0, 0.2);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .sub-header {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #8B4513;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
        }

        .image-container {
            width: 85%;
            max-width: 1000px;
            height: 75vh;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -100px auto 10px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .page-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            display: block;
        }

        /* ===== PASSWORD SECTION ===== */
        .password-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 0;
            flex-shrink: 0;
            min-height: 120px;
            margin-top: -110px;
            position: relative;
        }

        .password-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        .password-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 20px rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: box-shadow 0.3s ease;
        }

        .password-box:focus-within {
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.3),
                0 0 30px rgba(255, 255, 255, 0.05);
        }

        .input-container {
            position: relative;
            width: 100%;
        }

        .password-input {
            width: 100%;
            padding: 18px 50px 18px 25px;
            font-size: 17px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transition: all 0.3s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            -webkit-appearance: none;
            appearance: none;
        }

        .password-input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        .input-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 20px;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .input-container:focus-within .input-icon {
            color: rgba(255, 255, 255, 0.95);
        }

        .submit-btn {
            background: linear-gradient(135deg, 
                rgba(33, 150, 243, 0.85) 0%, 
                rgba(21, 101, 192, 0.85) 100%);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            padding: 18px 30px;
            font-size: 17px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            width: 100%;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, 
                rgba(33, 150, 243, 0.95) 0%, 
                rgba(21, 101, 192, 0.95) 100%);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        /* ===== ERROR TOAST ===== */
        .error-toast {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 80, 80, 0.12);
            padding: 10px 18px;
            border-radius: 12px;
            color: #ff9a8a;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            border: 1px solid rgba(255, 80, 80, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            width: 100%;
        }

        .error-toast i {
            font-size: 16px;
            color: #ff6b5a;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        /* ===== MAIN INTERFACE ===== */
        .main-interface {
            z-index: 800;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sections-overlay {
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            padding: 10px;
            overflow-y: auto;
        }

        .columns-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .column {
            flex: 0 1 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: space-evenly;
            min-height: 500px;
        }

        .section-btn {
            background: rgba(255, 253, 245, 0.85);
            border: none;
            border-radius: 18px;
            padding: 25px 10px;
            font-size: 22px;
            font-weight: 700;
            color: #5D4037;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 253, 245, 0.3);
            width: 100%;
            text-align: center;
            display: block;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
            position: relative;
        }

        .section-btn.unlocked {
            background: rgba(76, 175, 80, 0.85);
            color: white;
            text-shadow: none;
        }

        .section-btn.unlocked:hover {
            background: rgba(76, 175, 80, 0.95);
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
        }

        .section-btn:active {
            transform: scale(0.96);
        }

        .section-btn.used {
            display: none !important;
        }

        .lock-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .column:nth-child(1) .section-btn {
            border-right: 4px solid rgba(76, 175, 80, 0.4);
        }

        .column:nth-child(2) .section-btn {
            border-right: 4px solid rgba(33, 150, 243, 0.4);
        }

        /* ===== STATUS BAR ===== */
        .status-bar {
            position: fixed;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            z-index: 9999;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b6b;
            transition: all 0.3s ease;
        }

        .status-dot.open {
            background: #5fcb8a;
            box-shadow: 0 0 12px rgba(95, 203, 138, 0.3);
        }

        .status-dot.locked {
            background: #ff6b6b;
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.2);
        }

        .status-text {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .status-divider {
            opacity: 0.15;
        }

        /* ===== TIME LOCK OVERLAY ===== */
        .time-status {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            color: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 3px solid #ff6b6b;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .time-status h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .time-status p {
            font-size: 18px;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .time-status .time-detail {
            color: #ffd93d;
            font-size: 16px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-text { font-size: 2rem; }
            .sub-header { font-size: 1rem; }
            .image-container { height: 60vh; }
            .columns-container { flex-direction: column; }
            .column { max-width: 350px; min-height: auto; }
            .status-bar { font-size: 10px; gap: 12px; }
        }

        @media (max-width: 480px) {
            .header-text { font-size: 1.6rem; }
            .image-container { height: 55vh; }
            .password-box { padding: 20px; }
            .submit-btn { font-size: 15px; padding: 15px 20px; }
            .password-input { font-size: 15px; padding: 15px 45px 15px 20px; }
        }

        /* ===== SCROLLBAR HIDE ===== */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }

        /* ===== MAIN INTERFACE HEADER ===== */
        #mainInterface .header-text {
            color: #FF9800;
            text-shadow: none;
        }

        #mainInterface .sub-header {
            color: #F57C00;
            text-shadow: none;
        }

        #mainInterface .page-header {
            padding-bottom: 0px;
            margin-bottom: -70px;
        }

        #mainInterface .sections-overlay {
            margin-top: -60px;
            padding-top: 0;
        }
    </style>
</head>
<body>

    <!-- ===== LOCK SCREEN ===== -->
    <div id="combinedScreen" class="screen screen-bg active">
        <div class="page-header">
            <!-- Kept empty as per original -->
        </div>

        <div class="image-container">
            <img src="https://i.ibb.co/MDKxfWzQ/1234.png" 
                 alt="LFJC Image" 
                 class="page-image"
                 onerror="this.style.display='none'">
        </div>

        <div class="password-section">
            <div class="password-container">
                <div id="errorToast" class="error-toast">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Incorrect access code</span>
                </div>
                <div class="password-box" id="passwordBox">
                    <div class="input-container">
                        <input type="password" id="passwordInput" class="password-input" placeholder="Enter access code" autocomplete="off">
                        <span class="input-icon">🔒</span>
                    </div>
                    <button id="submitBtn" class="submit-btn">
                        <i class="fas fa-unlock-alt" style="font-size:16px;"></i>
                        Submit
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MAIN INTERFACE ===== -->
    <div id="mainInterface" class="main-interface screen">
        <div class="page-header">
            <div class="header-text">LFJC ONLINE EXAMINATION</div>
            <div class="sub-header"></div>
        </div>
        <div class="sections-overlay">
            <div id="timeStatus" class="time-status">
                <h2>🔒 All Exams Locked</h2>
                <p>Examinations are accessible only during scheduled hours</p>
                <div class="time-detail">⏰ Monday–Friday: 8:00 AM – 4:20 PM<br>Saturday: 8:00 AM – 1:30 PM</div>
            </div>
            <div class="columns-container" id="sectionsContainer">
                <div class="column">
                    <div style="color: white; text-align: center; padding: 20px;">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== STATUS BAR ===== -->
    <div class="status-bar">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Checking...</span>
        <span class="status-divider">|</span>
        <span style="opacity:0.5;">© LFJC 2026</span>
    </div>

    <script>
    (function() {
        "use strict";

        // ===== CONFIG =====
        const REGULAR_PASSWORD = "lfjc2025";
        const SECTION_URLS = {
            "1D": "https://lfjc1d.github.io/1d/",
            "1M": "https://lfjc1m.github.io/1M/",
            "1N": "https://lfjc1n.github.io/1n/",
            "1E": "https://lfjc1e.github.io/1e/",
            "2D": "https://lfjc2d.github.io/2d/",
            "2M": "https://lfjc2m.github.io/2m/",
            "2N": "https://lfjc2n.github.io/2n/",
            "2E": "https://lfjc2e.github.io/2e/"
        };

        // ===== DOM REFS =====
        const combinedScreen = document.getElementById('combinedScreen');
        const mainInterface = document.getElementById('mainInterface');
        const passwordInput = document.getElementById('passwordInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorToast = document.getElementById('errorToast');
        const errorText = document.getElementById('errorText');
        const passwordBox = document.getElementById('passwordBox');
        const sectionsContainer = document.getElementById('sectionsContainer');
        const timeStatus = document.getElementById('timeStatus');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // ===== STATE =====
        let usedClasses = new Set();
        let currentState = 'combined';
        let statusCheckInterval = null;

        // ===== HELPERS =====
        function isExamTime() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const currentTotalMinutes = currentHour * 60 + currentMinute;
            const day = now.getDay();

            if (day === 0) return false;
            if (day === 6) {
                return currentTotalMinutes >= 480 && currentTotalMinutes < 810;
            }
            return currentTotalMinutes >= 480 && currentTotalMinutes < 1200;
        }

        function updateStatusBar() {
            const isOpen = isExamTime();
            if (isOpen) {
                statusDot.className = 'status-dot open';
                statusText.textContent = 'Exams Available';
            } else {
                statusDot.className = 'status-dot locked';
                statusText.textContent = 'Exams Locked';
            }
        }

        function enterFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        function focusPassword() {
            setTimeout(() => passwordInput?.focus(), 100);
        }

        function switchScreen(toScreen) {
            combinedScreen.classList.remove('active');
            mainInterface.classList.remove('active');
            toScreen.classList.add('active');
        }

        function shakeBox() {
            passwordBox.classList.remove('shake');
            void passwordBox.offsetWidth;
            passwordBox.classList.add('shake');
            setTimeout(() => passwordBox.classList.remove('shake'), 500);
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorToast.style.display = 'flex';
            setTimeout(() => {
                errorToast.style.display = 'none';
            }, 4000);
        }

        // ===== RENDER SECTIONS =====
        function renderSections() {
            const sections = ['1D', '1M', '1N', '1E', '2D', '2M', '2N', '2E'];
            const column1 = sections.slice(0, 4);
            const column2 = sections.slice(4, 8);

            let html = `
                <div class="column">
                    ${column1.map(section => {
                        const isUsed = usedClasses.has(section);
                        return `
                            <button class="section-btn ${isUsed ? 'used' : 'unlocked'}" 
                                    data-section="${section}"
                                    ${isUsed ? 'disabled' : ''}>
                                ${section}
                                ${!isUsed ? '<span class="lock-badge" style="background: rgba(76,175,80,0.6);">🔓 OPEN</span>' : ''}
                            </button>
                        `;
                    }).join('')}
                </div>
                <div class="column">
                    ${column2.map(section => {
                        const isUsed = usedClasses.has(section);
                        return `
                            <button class="section-btn ${isUsed ? 'used' : 'unlocked'}" 
                                    data-section="${section}"
                                    ${isUsed ? 'disabled' : ''}>
                                ${section}
                                ${!isUsed ? '<span class="lock-badge" style="background: rgba(76,175,80,0.6);">🔓 OPEN</span>' : ''}
                            </button>
                        `;
                    }).join('')}
                </div>
            `;

            sectionsContainer.innerHTML = html;

            document.querySelectorAll('.section-btn:not(.used)').forEach(btn => {
                btn.addEventListener('click', function() {
                    const section = this.dataset.section;
                    const url = SECTION_URLS[section];

                    if (!url) {
                        alert(`URL for section ${section} not configured`);
                        return;
                    }

                    usedClasses.add(section);

                    this.style.transform = 'scale(0.96)';
                    this.style.opacity = '0.8';

                    setTimeout(() => {
                        window.open(url, '_blank');
                    }, 150);

                    setTimeout(() => {
                        try { window.close(); } catch(e) {}
                        try { window.location.href = 'about:blank'; } catch(e) {}
                    }, 200);

                    setTimeout(() => {
                        renderSections();
                    }, 300);
                });
            });
        }

        // ===== CHECK TIME & RENDER =====
        function checkTimeAndRender() {
            switchScreen(mainInterface);
            currentState = 'sections';
            updateStatusBar();

            if (isExamTime()) {
                timeStatus.style.display = 'none';
                renderSections();
            } else {
                timeStatus.style.display = 'block';
                sectionsContainer.innerHTML = '';
            }

            // Start interval to check time changes
            if (statusCheckInterval) clearInterval(statusCheckInterval);
            statusCheckInterval = setInterval(() => {
                const isOpen = isExamTime();
                updateStatusBar();
                if (isOpen && timeStatus.style.display !== 'none') {
                    timeStatus.style.display = 'none';
                    renderSections();
                } else if (!isOpen && timeStatus.style.display === 'none') {
                    timeStatus.style.display = 'block';
                    sectionsContainer.innerHTML = '';
                }
            }, 30000); // Check every 30 seconds
        }

        // ===== CHECK PASSWORD =====
        function checkPassword() {
            const pwd = passwordInput.value.trim();
            errorToast.style.display = 'none';

            if (!pwd) {
                showError('Please enter your access code');
                shakeBox();
                focusPassword();
                return;
            }

            if (pwd === REGULAR_PASSWORD) {
                enterFullscreen();
                checkTimeAndRender();
                passwordInput.value = '';
                if (statusCheckInterval) clearInterval(statusCheckInterval);
            } else {
                showError('Incorrect password. Please try again.');
                passwordInput.value = '';
                shakeBox();
                focusPassword();
            }
        }

        // ===== EVENTS =====
        submitBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') checkPassword();
        });

        document.addEventListener('keydown', e => {
            if (e.key !== 'Escape') return;
            e.preventDefault();

            if (currentState === 'sections') {
                switchScreen(combinedScreen);
                currentState = 'combined';
                passwordInput.value = '';
                focusPassword();
                if (statusCheckInterval) {
                    clearInterval(statusCheckInterval);
                    statusCheckInterval = null;
                }
                updateStatusBar();
            }
        });

        window.addEventListener('load', () => {
            focusPassword();
            updateStatusBar();
        });

        document.addEventListener('click', () => {
            if (currentState === 'combined') {
                enterFullscreen();
                focusPassword();
            }
        });

        errorToast.style.display = 'none';

        // ===== INITIAL STATUS =====
        updateStatusBar();
    })();
    </script>
</body>
</html>
