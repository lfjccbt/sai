<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LFJC · Examination Portal</title>
    <!-- Font & icons (optional but clean) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: #0b1219;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            color: #f0f4fc;
        }

        /* screens */
        .screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), visibility 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* ---- LOCK SCREEN (combined) ---- */
        .lock-screen {
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0b1219 80%);
            padding: 2rem 1.5rem;
            justify-content: center;
            gap: 1.5rem;
        }
        .lock-screen .brand {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .lock-screen .brand h1 {
            font-weight: 600;
            font-size: 2.4rem;
            letter-spacing: 2px;
            background: linear-gradient(145deg, #f6e9d7, #d4c5b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .lock-screen .brand span {
            display: block;
            font-weight: 400;
            letter-spacing: 3px;
            font-size: 0.9rem;
            color: #a0b8cc;
            text-transform: uppercase;
            margin-top: 0.2rem;
            -webkit-text-fill-color: #a0b8cc;
        }

        .lock-image {
            width: 82%;
            max-width: 460px;
            aspect-ratio: 16 / 10;
            background: rgba(255,255,255,0.03);
            border-radius: 32px;
            box-shadow: 0 20px 48px -8px rgba(0,0,0,0.7);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lock-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            padding: 0.2rem;
        }

        .password-card {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 34, 48, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px -12px rgba(0,0,0,0.8);
            transition: all 0.2s;
        }
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
        }
        .input-group:focus-within {
            border-color: rgba(255,215,150,0.5);
            box-shadow: 0 0 0 3px rgba(255,215,150,0.1);
        }
        .input-group i {
            position: absolute;
            left: 20px;
            color: #8aa0b9;
            font-size: 1.1rem;
        }
        .input-group input {
            width: 100%;
            padding: 18px 20px 18px 54px;
            background: transparent;
            border: none;
            font-size: 1rem;
            color: white;
            font-weight: 450;
            letter-spacing: 0.3px;
            outline: none;
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.35);
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .password-card .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-primary {
            flex: 1;
            background: linear-gradient(145deg, #e8c99b, #d6ad7a);
            border: none;
            border-radius: 60px;
            padding: 16px 12px;
            font-weight: 600;
            font-size: 1rem;
            color: #1a262f;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: scale(1.01);
            background: linear-gradient(145deg, #f0dcb0, #ddbc88);
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
        }
        .btn-primary:active { transform: scale(0.97); }
        .error-badge {
            background: rgba(255, 90, 70, 0.15);
            padding: 8px 18px;
            border-radius: 60px;
            color: #ff9a8a;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 6px;
            border-left: 3px solid #ff6b5a;
            backdrop-filter: blur(4px);
        }
        .error-badge i { margin-right: 6px; }

        /* ---- MAIN DASHBOARD ---- */
        .dashboard {
            background: radial-gradient(circle at 70% 10%, #1d2c3f, #0b1219 90%);
            padding: 0;
            justify-content: flex-start;
            align-items: center;
        }
        .dash-header {
            width: 100%;
            padding: 1.8rem 2rem 0.8rem;
            text-align: center;
            flex-shrink: 0;
        }
        .dash-header h2 {
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: 1px;
            color: #f2e5d4;
            text-shadow: 0 2px 12px rgba(0,0,0,0.6);
        }
        .dash-header h2 i { color: #dbbd94; margin-right: 8px; }
        .dash-header .sub {
            color: #8da1b5;
            font-weight: 300;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sections-scroll {
            flex: 1;
            width: 100%;
            padding: 0.5rem 1.5rem 2rem;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            scrollbar-width: none;
        }
        .sections-scroll::-webkit-scrollbar { display: none; }

        .section-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 1.2rem;
            max-width: 800px;
            width: 100%;
        }
        .section-card {
            background: rgba(255, 253, 245, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 28px;
            padding: 1.6rem 1.4rem;
            min-width: 140px;
            flex: 1 0 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
            color: #d6dce3;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-right: 4px solid rgba(210, 180, 140, 0.2);
        }
        .section-card.unlocked {
            background: rgba(80, 180, 120, 0.12);
            border-color: rgba(140, 220, 170, 0.3);
            border-right: 4px solid #7bcfa4;
        }
        .section-card.unlocked:hover {
            background: rgba(80, 180, 120, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.5);
        }
        .section-card .code {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #f0e4d0;
        }
        .section-card .badge {
            font-size: 0.7rem;
            background: rgba(140, 220, 170, 0.2);
            padding: 4px 14px;
            border-radius: 40px;
            color: #b0e0c0;
            border: 1px solid rgba(140, 220, 170, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section-card.used {
            display: none !important;
        }
        .section-card.disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(0.8);
        }

        .time-lock-overlay {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.8rem 2.2rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,200,150,0.1);
            margin: 1rem auto;
        }
        .time-lock-overlay i {
            font-size: 3.2rem;
            color: #d4a373;
            margin-bottom: 0.5rem;
        }
        .time-lock-overlay h3 {
            font-weight: 400;
            color: #e8dccc;
            letter-spacing: 1px;
            font-size: 1.6rem;
        }
        .time-lock-overlay p {
            color: #8da7bf;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1rem;
        }
        .global-footer {
            position: fixed;
            bottom: 16px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1.5px;
            font-weight: 300;
            z-index: 999;
            pointer-events: none;
        }

        /* responsive */
        @media (max-width: 600px) {
            .lock-screen .brand h1 { font-size: 1.8rem; }
            .password-card { padding: 1.5rem 1.2rem; }
            .section-card { min-width: 120px; flex: 1 0 120px; padding: 1.2rem 0.8rem; }
            .section-card .code { font-size: 1.4rem; }
            .dash-header h2 { font-size: 1.5rem; }
        }
        @media (max-width: 420px) {
            .section-grid { gap: 0.8rem; }
            .section-card { flex: 1 0 100px; }
        }
    </style>
</head>
<body>

    <!-- LOCK SCREEN -->
    <div id="lockScreen" class="screen lock-screen active">
        <div class="brand">
            <h1>LFJC</h1>
            <span>examination portal</span>
        </div>
        <div class="lock-image">
            <img src="https://i.ibb.co/MDKxfWzQ/1234.png" alt="LFJC badge" onerror="this.style.display='none'">
        </div>
        <div class="password-card">
            <div id="errorMessage" class="error-badge" style="display:none;"><i class="fas fa-exclamation-circle"></i> <span id="errorText">Invalid</span></div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="passwordInput" placeholder="Access code" autocomplete="off">
            </div>
            <div class="actions">
                <button id="submitBtn" class="btn-primary"><i class="fas fa-arrow-right"></i> Unlock</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardScreen" class="screen dashboard">
        <div class="dash-header">
            <h2><i class="fas fa-graduation-cap"></i> LFJC · Online</h2>
            <div class="sub">examination sections</div>
        </div>
        <div class="sections-scroll">
            <div id="timeStatus" class="time-lock-overlay" style="display: none;">
                <i class="fas fa-clock"></i>
                <h3>All exams locked</h3>
                <p>Examinations are accessible only during scheduled hours.</p>
            </div>
            <div class="section-grid" id="sectionsContainer">
                <!-- dynamic sections -->
            </div>
        </div>
    </div>

    <div class="global-footer">© LFJC 2026 · All rights reserved</div>

    <script>
    (function() {
        "use strict";

        // ---- CONFIG ----
        const REGULAR_PASSWORD = "lfjc2025";
        const SECTION_URLS = {
            "1D": "https://lfjc1d.github.io/1d/",
            "1M": "https://lfjc1m.github.io/1M/",
            "1N": "https://lfjc1n.github.io/1n/",
            "1E": "https://lfjc1e.github.io/1e/",
            "2D": "https://lfjc2d.github.io/2d/",
            "2M": "https://lfjc2m.github.io/2m/",
            "2N": "https://lfjc2n.github.io/2n/",
            "2E": "https://lfjc2e.github.io/2e/"
        };
        const SECTIONS = ['1D','1M','1N','1E','2D','2M','2N','2E'];

        // ---- STATE ----
        let usedClasses = new Set();
        let currentScreen = 'lock'; // 'lock' or 'dashboard'
        const lockScreen = document.getElementById('lockScreen');
        const dashboardScreen = document.getElementById('dashboardScreen');
        const passwordInput = document.getElementById('passwordInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const sectionsContainer = document.getElementById('sectionsContainer');
        const timeStatus = document.getElementById('timeStatus');

        // ---- helpers ----
        function isExamTime() {
            const now = new Date();
            const day = now.getDay();
            const totalMin = now.getHours() * 60 + now.getMinutes();
            if (day === 0) return false;
            if (day === 6) return totalMin >= 480 && totalMin < 810;  // saturday 8:00-13:30
            return totalMin >= 480 && totalMin < 1200;                 // mon-fri 8:00-16:20
        }

        function switchScreen(screenId) {
            lockScreen.classList.remove('active');
            dashboardScreen.classList.remove('active');
            if (screenId === 'lock') {
                lockScreen.classList.add('active');
                currentScreen = 'lock';
                setTimeout(() => passwordInput?.focus(), 80);
            } else {
                dashboardScreen.classList.add('active');
                currentScreen = 'dashboard';
                if (!isExamTime()) {
                    timeStatus.style.display = 'block';
                    sectionsContainer.innerHTML = '';
                } else {
                    timeStatus.style.display = 'none';
                    renderSections();
                }
            }
        }

        function renderSections() {
            let html = '';
            SECTIONS.forEach((sec) => {
                const isUsed = usedClasses.has(sec);
                const unlocked = !isUsed && isExamTime();
                const disabled = isUsed || !isExamTime();
                const badgeText = isUsed ? '' : (isExamTime() ? '● open' : '');
                html += `
                    <div class="section-card ${unlocked ? 'unlocked' : ''} ${isUsed ? 'used' : ''} ${!unlocked ? 'disabled' : ''}"
                         data-section="${sec}" 
                         style="${isUsed ? 'display:none;' : ''}">
                        <div class="code">${sec}</div>
                        ${badgeText ? `<div class="badge">${badgeText}</div>` : ''}
                    </div>
                `;
            });
            sectionsContainer.innerHTML = html;

            // attach events
            document.querySelectorAll('.section-card:not(.used):not(.disabled)').forEach(card => {
                card.addEventListener('click', function(e) {
                    const section = this.dataset.section;
                    const url = SECTION_URLS[section];
                    if (!url) {
                        alert('Section URL missing.');
                        return;
                    }
                    usedClasses.add(section);
                    // open in new tab
                    window.open(url, '_blank');
                    // remove card after a moment
                    setTimeout(() => {
                        renderSections();
                    }, 180);
                });
            });
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 3200);
        }

        function shakePassword() {
            const card = document.querySelector('.password-card');
            card.style.transition = 'transform 0.08s';
            card.style.transform = 'translateX(-6px)';
            setTimeout(() => card.style.transform = 'translateX(6px)', 80);
            setTimeout(() => card.style.transform = 'translateX(-4px)', 160);
            setTimeout(() => card.style.transform = 'translateX(4px)', 240);
            setTimeout(() => card.style.transform = 'translateX(0)', 320);
        }

        // ---- password check ----
        function checkPassword() {
            const pwd = passwordInput.value.trim();
            errorMsg.style.display = 'none';
            if (!pwd) {
                showError('Enter access code');
                shakePassword();
                passwordInput.value = '';
                passwordInput.focus();
                return;
            }
            if (pwd === REGULAR_PASSWORD) {
                // fullscreen request
                try { document.documentElement.requestFullscreen?.(); } catch(_) {}
                switchScreen('dashboard');
                passwordInput.value = '';
            } else {
                showError('Incorrect code · try again');
                passwordInput.value = '';
                shakePassword();
                passwordInput.focus();
            }
        }

        // ---- events ----
        submitBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkPassword();
            }
        });

        // Escape: go back to lock screen from dashboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && currentScreen === 'dashboard') {
                e.preventDefault();
                switchScreen('lock');
                passwordInput.value = '';
                setTimeout(() => passwordInput.focus(), 60);
            }
        });

        // click on lock background → focus
        lockScreen.addEventListener('click', (e) => {
            if (e.target === lockScreen || e.target.closest('.lock-screen') && !e.target.closest('.password-card')) {
                passwordInput.focus();
            }
        });

        // on load: focus
        window.addEventListener('load', () => {
            setTimeout(() => passwordInput.focus(), 200);
        });

        // touch/click on dashboard could focus nothing, but we keep it.
        // additional: if user clicks outside sections, no action.

        // Initial render (just in case)
        // but we stay on lock screen until password.
        // prefill usedClasses for demo? none.

        // if you want to test without password, uncomment:
        // switchScreen('dashboard');
    })();
    </script>
</body>
</html>
